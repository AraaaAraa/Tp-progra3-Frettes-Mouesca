<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="css/main.css" />
<link rel="stylesheet" href="css/bienvenida.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Arbutus&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Kreon:wght@300..700&display=swap" rel="stylesheet">
<title>Bienvenida</title>
</head>
<body>
<div class="contenido-contenedor">
<div class="inicio-usuario">

    <div class="tabs-auth kreon">
    <button id="tab-login" class="tab-auth tab-activa" type="button">Login</button>
    <button id="tab-registro" class="tab-auth" type="button">Registro</button>
    </div>

    <div class="contenedor-titulo">
    <div class="cubo-texto">
        <p id="titulo-auth" class="principal-titulo arbutus-regular">Bienvenidos</p>
    </div>
    </div>

    <div id="grupo-nombre" class="campo-ingreso oculto">
    <label class="kreon sub-titulos">Nombre</label>
    <input type="text" id="nombre-usuario" class="furmulario-cubo">
    </div>

    <div class="campo-ingreso">
    <label class="kreon sub-titulos">Email</label>
    <input type="email" id="email-usuario" class="furmulario-cubo">
    </div>

    <div class="campo-ingreso">
    <label class="kreon sub-titulos">Contraseña</label>
    <input type="password" id="contrasena-usuario" class="furmulario-cubo">
    </div>

    <p id="login-error" class="kreon msg-auth"></p>
    <button id="btn-ingresar" class="btn-ingresar" type="button">Ingresar</button>
</div>
</div>

<script src="js/bienvenida.js"></script>
</body>
</html>
