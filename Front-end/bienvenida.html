<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bienvenida.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Arbutus&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kreon:wght@300..700&family=Pirata+One&display=swap" rel="stylesheet">
    <title>Bienvenida</title>
</head>
<body>

    <div class="contenido-contenedor">
        <div class="logo"></div>

        <div class="inicio-usuario">

            <div class="contenedor-titulo">
                <div class="cubo-texto">
                    <p class="principal-titulo arbutus-regular">Bienvenidos</p>
                </div>
            </div>
            <div class="campo-ingreso">
                <label class="kreon sub-titulos">Nombre</label>
                <input type="text" name="nombre" id="nombre-usuario" class="furmulario-cubo ">
            </div>
            <div class="campo-busqueda">
                <label class="kreon sub-titulos">Contraseña</label>
                <input type="text" name="contraseña" id="contraseña-usuario" class="furmulario-cubo ">
            </div>
            

            <button class="btn-ingresar">Ingresar</button>
        </div>
    </div>
    
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
