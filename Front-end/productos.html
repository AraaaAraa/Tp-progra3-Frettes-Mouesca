<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/productos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Arbutus&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kreon:wght@300..700&family=Pirata+One&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Todos nuestros juegos</title>
</head>
<body>
    <!-- Barra de elementos superior -->
    <div class="barra-superior">
        <nav>
            <div class="logo">
                <img src="img/logo.png" alt="logo" class="im-barra imagen-logo">
            </div>
            <div class="sub-barra-busqueda">
                <button id="btn-tableros" class="elemento-filtro kreon">Tableros</button>
                <button id="btn-cartas" class="elemento-filtro kreon">Cartas</button>
            </div>
            <h1 class="arbutus-regular titulo-productos"> Todos nuestros juegos</h1>
            <div class="contendor-carrito">
                <a href="carrito.html">
                    <img src="img/carrito.png" alt="carrito" class="im-barra imagen-carrito">
                </a>
            </div>
        </nav>
    </div>

    <div class="productos-general">
        <div class="contenedor-busqueda">
            <input id="barra-busqueda" type="text" class="barra-busqueda-elementos kreon">
        </div>
        <div id="contenedor-bloques-productos">
            
            <!-- ver el tema de usar value y asosiarlo con el id del producto para que cuando el usuario apriete el boton + se envie el proceso al sistema de carrito.-->
        </div>
    </div>
    <script src="js/productos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
